<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <g transform="rotate(-45, 16, 16)" filter="url(#glow)">
    <!-- Syringe Body -->
    <rect x="12" y="6" width="8" height="16" rx="1" fill="#39FF14" fill-opacity="0.3" stroke="#39FF14" stroke-width="2"/>
    <!-- Plunger (y position pushed down to 6) -->
    <line x1="16" y1="6" x2="16" y2="6" stroke="#39FF14" stroke-width="2"/>
    <line x1="12" y1="6" x2="20" y2="6" stroke="#39FF14" stroke-width="2"/>
    <!-- Needle Base -->
    <path d="M12 22 L16 26 L20 22" fill="none" stroke="#39FF14" stroke-width="2"/>
    <!-- Needle -->
    <line x1="16" y1="26" x2="16" y2="32" stroke="#39FF14" stroke-width="2"/>
  </g>
</svg>
